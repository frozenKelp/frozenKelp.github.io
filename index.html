<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Frigid Shores</title>
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
  <meta name="description" content="Frigid Shores - A desolate coastline where icy winds whisper secrets of the deep." />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    /* Reset & base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Lora', serif;
      color: #e0e0e0;
      overflow: hidden;
    }

    /* Background video */
    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* Overlay */
    .overlay {
      position: relative;
      width: 100%;
      height: 100vh;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 4rem;
      color: #72bcd4;
      margin-bottom: 20px;
    }

    blockquote {
      font-size: 1.8rem;
      line-height: 1.4;
      max-width: 800px;
    }

    .attribution {
      display: inline-block;
      margin-left: 200px;
      margin-top: 10px;
    }

    /* Scroll indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 20px;
      font-size: 2rem;
      color: #e0e0e0;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Hamburger menu */
    .hamburger {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 30px;
      height: 25px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      z-index: 1000;
    }

    .hamburger span {
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
    }

    /* Dropdown menu */
    .dropdown {
      position: absolute;
      top: 60px;
      right: 20px;
      background: rgba(20, 20, 20, 0.9);
      border-radius: 30px;
      padding: 20px 30px;
      display: none;
      flex-direction: column;
      gap: 15px;
      z-index: 999;
      width: 180px;
    }

    .dropdown a {
      color: #e0e0e0;
      text-decoration: none;
      font-weight: bold;
      text-align: right;
      font-family: 'Lora', serif;
    }

    .dropdown.show {
      display: flex;
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      h1 {
        font-size: 2.5rem;
      }

      blockquote {
        font-size: 1.2rem;
      }

      .attribution {
        margin-left: 0;
      }

      .dropdown {
        width: 150px;
        padding: 15px 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Background video with fallback image -->
  <video class="video-background" autoplay muted loop poster="fallback.jpg">
    <source src="background.mp4" type="video/mp4" />
    Your browser does not support the video tag.
  </video>

  <!-- Hamburger menu -->
  <div class="hamburger" onclick="toggleMenu()" aria-label="Toggle menu" role="button" tabindex="0">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- Dropdown nav menu -->
  <div class="dropdown" id="navMenu">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Projects</a>
    <a href="#">Posts</a>
    <a href="#">Redirect</a>
  </div>

  <!-- Main content -->
  <div class="overlay">
    <h1>Frigid Shores</h1>
    <blockquote>
      Imagination is more important than knowledge. For knowledge is limited, whereas imagination embraces the entire world.
      <br><span class="attribution">— Albert Einstein</span>
    </blockquote>
    <div class="scroll-indicator">↓</div>
  </div>

  <!-- Menu toggle script -->
  <script>
    function toggleMenu() {
      const menu = document.getElementById('navMenu');
      menu.classList.toggle('show');
    }
  </script>
</body>
</html>
